version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "@types/node"
        update-types: ["semver-patch", "semver-minor", "semver-major"]
      - dependency-name: "typescript"
        update-types: ["semver-patch", "semver-minor", "semver-major"]
      - dependency-name: "jest"
        update-types: ["semver-patch", "semver-minor", "semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["semver-patch", "semver-minor", "semver-major"]
    groups:
      dev-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
