        <h1>numis — Natural Language Money Parser for JavaScript</h1>
        <p>
          <strong>numis</strong> is a lightweight JavaScript/TypeScript library that parses monetary expressions from free-form text into structured data.
          It supports currency symbols ($, €, £, ¥, ₹ and 70+ more), ISO-4217 codes (USD, EUR, GBP), worded numbers ("one hundred dollars"), slang ("bucks", "quid", "grand"), magnitude suffixes ("10k", "5M"), ranges ("$50 to $100"), comparison operators ("&lt; 30k"), regional formats, and negative indicators.
        </p>
        <h2>Quick start</h2>
        <pre>npm install numis</pre>
        <pre>import { parseMoney } from "numis";
const result = parseMoney("The price is $49.99");
// { original: "The price is $49.99", currency: "USD", amount: 49.99 }</pre>
        <h2>Features</h2>
        <ul>
          <li>Symbols &amp; ISO codes — 70+ currency symbols and all ISO-4217 codes</li>
          <li>Worded numbers — English worded amounts, fractions, and scales up to billions</li>
          <li>Ranges — hyphens, "to", "through", "between"</li>
          <li>Comparison bounds — &lt; and &gt; expressions</li>
          <li>Slang &amp; idioms — bucks, quid, fiver, tenner, grand</li>
          <li>Regional formats — European, Swiss, and Brazilian number formatting</li>
        </ul>
        <h2>Documentation</h2>
        <p>Visit the interactive playground on this page to try numis live, or read the full documentation on <a href="https://github.com/ritvij14/numis">GitHub</a> and <a href="https://www.npmjs.com/package/numis">npm</a>.</p>
